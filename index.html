<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scisors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class="lead">Rock paper scissor</h1>
    <div class="img">
    <img class="rock" data-choice="rock" src="rock.png" alt="random image">
    <img class="paper" data-choice="paper" src="paper.png" alt="random image">
    <img class="scissor" data-choice="scissor" src="scisor.png" alt="random image">
    </div>
    <div class="scoreboard">
    <div class="user">
        <b class="userscore">0</b>
        <p>You</p>
    </div>

    <div class="comp">
        <b class="compscore">0</b>
        <p>Comp</p>
    </div>
    </div>
    
    <div class="start">
        <i class="text">play your move</i>
    </div>
    <button class="reset">Reset Game</button>
    <script src="yes.js"></script>
</body>
</html>
